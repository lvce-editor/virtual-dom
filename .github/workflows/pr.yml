name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  pr:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Compute node modules cache key
        id: nodeModulesCacheKey
        run: echo "value=$(node packages/build/src/computeNodeModulesCacheKey.js)" >> $GITHUB_OUTPUT
        shell: bash
      - uses: actions/cache@v6
        id: npm-cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-cacheNodeModules-${{ steps.nodeModulesCacheKey.outputs.value }}
      - name: npm ci
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
      - run: npm run build
      - run: npm test
      - run: npm run type-check
      - run: npm run lint
      - name: install playwright dependencies
        working-directory: ./packages/e2e
        run: npx playwright install chromium
        if: steps.npm-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: e2e
        working-directory: ./packages/e2e
        run: npm run e2e:headless
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Install benchmark Chromium
        if: matrix.os == 'ubuntu-24.04' && steps.npm-cache.outputs.cache-hit != 'true'
        working-directory: ./packages/benchmark
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Run synthetic benchmarks
        if: matrix.os == 'ubuntu-24.04'
        working-directory: ./packages/benchmark
        run: npm run benchmark
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Run detailed explorer benchmark
        if: matrix.os == 'ubuntu-24.04'
        working-directory: ./packages/benchmark
        run: npm run benchmark:detailed
        env:
          DETAILED_BENCHMARK_TIMEOUT_MS: 3600000
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Run detailed activity bar benchmark
        if: matrix.os == 'ubuntu-24.04'
        working-directory: ./packages/benchmark
        run: npm run benchmark:activity-bar
        env:
          DETAILED_BENCHMARK_TIMEOUT_MS: 3600000
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Run detailed about view benchmark
        if: matrix.os == 'ubuntu-24.04'
        working-directory: ./packages/benchmark
        run: npm run benchmark:about-view
        env:
          DETAILED_BENCHMARK_TIMEOUT_MS: 3600000
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Upload benchmark results
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: virtual-dom-benchmark-results
          path: packages/benchmark/dist
          if-no-files-found: error
          retention-days: 30
