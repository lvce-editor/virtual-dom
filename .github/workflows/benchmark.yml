name: Benchmark

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: benchmark-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Compute node modules cache key
        id: nodeModulesCacheKey
        run: echo "value=$(node packages/build/src/computeNodeModulesCacheKey.js)" >> $GITHUB_OUTPUT
        shell: bash
      - uses: actions/cache@v5
        id: npm-cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-cacheNodeModules-${{ steps.nodeModulesCacheKey.outputs.value }}
      - name: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build virtual DOM packages
        run: npm run build
      - name: Install Chromium
        if: steps.npm-cache.outputs.cache-hit != 'true'
        working-directory: ./packages/benchmark
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Run benchmarks
        working-directory: ./packages/benchmark
        run: npm run benchmark
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: virtual-dom-benchmark-results
          path: packages/benchmark/dist
          if-no-files-found: error
          retention-days: 30
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/benchmark/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: benchmark
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy benchmark report
        id: deployment
        uses: actions/deploy-pages@v5
